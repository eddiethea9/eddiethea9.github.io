  <style>
    :root {
      --primary-color: rgb(255, 255, 255);
      --secondary-color: #f8f9fa;
      --hover-color: rgba(112, 148, 185, 0.12);
      --text-color: #7094b9;
      --light-text: #bbbaba;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(180deg,
          #121212 0%,
          #1B2835 50%,
          #121212 100%);
      color: var(--text-color);
      text-align: center;
      padding: 5px 5px;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      background-color: transparent;
      padding: 15px 15px 15px;
      display: flex;
      flex-direction: column;
      height: 90vh;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: var(--text-color);
      font-weight: 600;
    }

    .scrollable-buttons {
      flex: 1;
      overflow-y: auto;

      border: 1px solid #716F6F;
      border-radius: 20px;

      background: rgba(255, 255, 255, 0);
      backdrop-filter: blur(5px);

      padding: 20px;

      margin: 10px 0;

      overflow-x: hidden;

      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .scrollable-buttons::-webkit-scrollbar {
      display: none;
    }

    .buttons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 12px;
      width: 100%;
      margin-bottom: 10px;
      margin-top: 10px;
    }

    .btn {
      width: 100%;
      height: 0;
      padding-bottom: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 600;
      background-color: transparent;
      color: #bbbaba;
      border: 1px solid #7094b9;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(118, 120, 128, 0.2);
    }

    .btn span {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .btn:hover {
      background-color: var(--hover-color);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(74, 107, 255, 0.3);
    }

    .btn:active {
      transform: scale(1.2);
      background-color: rgba(112, 148, 185, 0.12);
      box-shadow: 0 0 15px rgba(112, 148, 185, 0.5);
    }

    .btn.disabled-btn,
    .btn:disabled {
      opacity: 0.6;
      background-color: transparent;
      color: #595b5e;
      cursor: not-allowed;
      position: relative;
      border: 1px solid #3d5268;
    }

    .btn.disabled-btn span,
    .btn:disabled span {
      display: flex !important;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 1.2rem;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
    }

    .btn.disabled-btn span::after,
    .btn:disabled span::after {
      content: "🔒";
      font-size: 0.7em;
      display: block;
      margin-top: 2px;
      opacity: 0.9;
    }

    .btn.disabled-btn span::before,
    .btn:disabled span::before {
      content: none;
    }

    .footer {
      margin-top: auto;
      color: var(--light-text);
      font-size: 1rem;
      padding-top: 20px;
    }

    .scrollable-buttons::-webkit-scrollbar {
      width: 6px;
    }

    .scrollable-buttons::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    .scrollable-buttons::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 10px;
    }

    .scrollable-buttons::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }

    @media (min-width: 769px) and (max-width: 1024px) {
      .buttons-grid {
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
        gap: 12px;
      }
    }

    @media (max-width: 768px) {
      .buttons-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      .btn {
        font-size: 1.2rem;
      }
    }

    @media (max-width: 480px) {
      .buttons-grid {
        gap: 8px;
      }

      .btn {
        font-size: 1rem;
      }
    }
  </style>
</head>
